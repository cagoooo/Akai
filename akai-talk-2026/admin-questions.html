<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>提問後台管理 · 2026 AIFED · admin only</title>
<link rel="icon" href="favicon.svg" />
<meta name="robots" content="noindex, nofollow" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1F4C3E;
    --navy-deep: #143526;
    --cream: #F4F0E6;
    --orange: #C99744;
    --red: #B9512B;
    --green-ok: #2F7A4F;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color: var(--cream);
    font-family: 'Noto Sans TC', system-ui, sans-serif;
    width: 100%; min-height: 100vh;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 28px 20px 60px; }

  header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
  .brand { font-size: 20px; font-weight: 900; letter-spacing: 0.03em; }
  .brand .tag { font-size: 11px; background: var(--red); padding: 3px 8px; border-radius: 999px; margin-left: 8px; vertical-align: middle; font-weight: 800; }
  .user-info { font-size: 13px; color: rgba(244,240,230,.7); font-family: 'JetBrains Mono', monospace; display: flex; gap: 12px; align-items: center; }
  .btn { padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--orange); background: transparent; color: var(--orange); font-weight: 700; cursor: pointer; font-family: inherit; font-size: 13px; transition: background .15s ease, color .15s ease; }
  .btn:hover { background: var(--orange); color: var(--navy-deep); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red); color: #fff; }
  .btn.primary { border-color: var(--green-ok); color: var(--green-ok); }
  .btn.primary:hover { background: var(--green-ok); color: #fff; }

  /* 登入畫面 */
  .login-card { max-width: 480px; margin: 60px auto; padding: 32px; background: rgba(244,240,230,.05); border: 1.5px solid rgba(244,240,230,.15); border-radius: 16px; text-align: center; }
  .login-card h1 { margin: 0 0 14px; font-size: 22px; }
  .login-card p { font-size: 14px; color: rgba(244,240,230,.7); line-height: 1.7; margin: 0 0 14px; }
  .login-card .admin-hint {
    margin: 12px 0 24px;
    color: rgba(244,240,230,.85);
    font-size: 14px;
  }
  .login-card .admin-hint code {
    background: rgba(20,53,38,.7);
    color: var(--orange);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .login-card .btn { font-size: 15px; padding: 12px 28px; }

  /* 工具列 */
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; padding: 14px 16px; background: rgba(244,240,230,.04); border: 1.5px solid rgba(244,240,230,.1); border-radius: 12px; align-items: center; }
  .toolbar-stat { font-size: 13px; color: rgba(244,240,230,.7); font-family: 'JetBrains Mono', monospace; margin-right: auto; }
  .toolbar-stat strong { color: var(--orange); font-size: 16px; }

  /* 訊息卡片 */
  .question-list { display: flex; flex-direction: column; gap: 10px; }
  .q-card {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    padding: 14px 18px;
    background: rgba(244,240,230,.06);
    border: 1.5px solid rgba(244,240,230,.12);
    border-radius: 12px;
    transition: opacity .2s ease, border-color .2s ease;
    align-items: center;
  }
  .q-card.hidden { opacity: 0.45; border-style: dashed; }
  .q-card.pinned { border-color: var(--orange); background: rgba(201,151,68,.12); }
  .q-meta { display: flex; flex-direction: column; gap: 4px; min-width: 100px; }
  .q-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: rgba(201,151,68,.18); border: 1px solid var(--orange); border-radius: 999px; font-size: 11px; font-weight: 800; color: var(--orange); font-family: 'JetBrains Mono', monospace; width: fit-content; }
  .q-time { font-size: 11px; color: rgba(244,240,230,.45); font-family: 'JetBrains Mono', monospace; }
  .q-text { font-size: 16px; line-height: 1.5; word-break: break-word; }
  .q-text.text-hidden { text-decoration: line-through; }
  .q-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .q-actions button { padding: 6px 12px; font-size: 12px; border-radius: 8px; border: 1.5px solid; background: transparent; cursor: pointer; font-family: inherit; font-weight: 700; transition: all .15s ease; }
  .btn-pin { border-color: var(--orange); color: var(--orange); }
  .btn-pin:hover, .btn-pin.active { background: var(--orange); color: var(--navy-deep); }
  .btn-hide { border-color: rgba(244,240,230,.4); color: rgba(244,240,230,.7); }
  .btn-hide:hover, .btn-hide.active { background: rgba(244,240,230,.2); color: var(--cream); }
  .btn-del { border-color: var(--red); color: var(--red); }
  .btn-del:hover { background: var(--red); color: #fff; }

  .status-pill { display: inline-block; padding: 1px 6px; border-radius: 999px; font-size: 9px; font-weight: 800; letter-spacing: 0.05em; margin-left: 4px; }
  .status-pill.pin { background: var(--orange); color: var(--navy-deep); }
  .status-pill.hide { background: rgba(244,240,230,.25); color: var(--cream); }

  .empty-state { text-align: center; padding: 60px 20px; color: rgba(244,240,230,.5); }
  .empty-state .emoji { font-size: 56px; opacity: .6; }

  /* T2: 鍵盤選中高亮 */
  .q-card.selected {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(201,151,68,.3), 0 6px 18px rgba(0,0,0,.3);
    transform: translateX(2px);
  }

  /* T2: 鍵盤快捷鍵 overlay */
  .kbd-overlay {
    position: fixed; inset: 0;
    background: rgba(15,20,30,.82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 9999;
  }
  .kbd-overlay.visible { display: flex; }
  .kbd-overlay-inner {
    background: var(--navy);
    border: 2px solid #fff;
    border-radius: 14px;
    padding: 28px 36px;
    max-width: 480px; width: calc(100% - 48px);
    box-shadow: 6px 8px 0 rgba(0,0,0,.32);
  }
  .kbd-overlay h2 { margin: 0 0 18px; font-size: 20px; display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .kbd-overlay h2 .close-x { font-size: 11px; background: transparent; border: 1.5px solid rgba(255,255,255,.5); color: #fff; border-radius: 999px; padding: 4px 10px; cursor: pointer; font-family: inherit; }
  .kbd-overlay table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .kbd-overlay td { padding: 6px 0; }
  .kbd-overlay td:first-child { color: var(--orange); font-family: 'JetBrains Mono', monospace; font-weight: 700; width: 40%; }

  .error-banner {
    background: rgba(185,81,43,.18);
    border: 1.5px solid var(--red);
    padding: 14px 18px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    color: #ffeae0;
    box-shadow: 0 0 24px rgba(185,81,43,.25);
    animation: errorShake .4s ease-out;
  }
  @keyframes errorShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  @media (max-width: 640px) {
    .wrap { padding: 16px 12px 40px; }
    .q-card { grid-template-columns: 1fr; gap: 8px; padding: 12px 14px; }
    .q-meta { flex-direction: row; align-items: center; }
    .q-text { font-size: 14px; }
    .q-actions { justify-content: flex-end; flex-wrap: wrap; }
    .q-actions button { font-size: 11px; padding: 5px 10px; }
    .toolbar { padding: 10px 12px; }
    .toolbar-stat { font-size: 12px; flex: 1 1 100%; }
    header .brand { font-size: 16px; }
    header .user-info { font-size: 11px; flex: 1 1 100%; justify-content: space-between; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">🛡️ 提問後台管理 <span class="tag">ADMIN</span></div>
    <div class="user-info" id="userInfo" style="display:none;">
      <span id="userEmail"></span>
      <button class="btn" id="logoutBtn">登出</button>
    </div>
  </header>

  <!-- 全域錯誤訊息（登入失敗 / 無權限 / 操作失敗 都顯示在這） -->
  <div class="error-banner" id="errorBanner" style="display:none;"></div>

  <!-- 登入畫面 (預設顯示) -->
  <div class="login-card" id="loginCard">
    <h1>🔒 需要管理員登入</h1>
    <p class="admin-hint">
      請用 <code>ipad@mail2.smes.tyc.edu.tw</code> 登入
    </p>
    <button class="btn primary" id="loginBtn">🔑 Google 登入</button>
  </div>

  <!-- 後台主畫面 (登入後顯示) -->
  <div id="adminPanel" style="display:none;">
    <div class="toolbar">
      <div class="toolbar-stat">
        共 <strong id="totalCount">0</strong> 則 ·
        顯示中 <strong id="visibleCount">0</strong> ·
        隱藏 <strong id="hiddenCount">0</strong> ·
        置頂 <strong id="pinnedCount">0</strong>
      </div>
      <button class="btn" id="refreshBtn">🔄 重新整理</button>
      <button class="btn" id="exportBtn">📤 匯出 Markdown</button>
      <button class="btn" id="kbdBtn" title="顯示鍵盤快捷鍵 (?)">⌨️ 快捷鍵</button>
      <a class="btn" href="live-questions.html" target="_blank" style="text-decoration:none;display:inline-flex;align-items:center;">👁️ 看公開大螢幕頁</a>
      <button class="btn danger" id="clearAllBtn">⚠️ 清空全部</button>
    </div>
    <div class="question-list" id="questionList"></div>
  </div>
</div>

<!-- T2: 鍵盤快捷鍵 overlay -->
<div class="kbd-overlay" id="kbdOverlay">
  <div class="kbd-overlay-inner">
    <h2>⌨️ 鍵盤快捷鍵 <button class="close-x" id="kbdCloseBtn">Esc 關閉</button></h2>
    <table>
      <tr><td>↑ / ↓</td><td>選擇上 / 下一則訊息</td></tr>
      <tr><td>P</td><td>📌 置頂 / 取消置頂選中訊息</td></tr>
      <tr><td>H</td><td>🙈 隱藏 / 取消隱藏選中訊息</td></tr>
      <tr><td>D / Delete</td><td>🗑️ 刪除選中訊息（含 confirm）</td></tr>
      <tr><td>E</td><td>📤 匯出 Markdown</td></tr>
      <tr><td>?</td><td>顯示 / 隱藏此說明</td></tr>
      <tr><td>Esc</td><td>關閉說明 / 取消選擇</td></tr>
    </table>
    <div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.18);font-size:11px;color:rgba(255,255,255,.6);font-style:italic;">
      提示：游標若在輸入框內，快捷鍵會自動停用避免誤觸
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';
  import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc, writeBatch, getDocs } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDWwk3dCFmEM9_5x07fvmBMZ6LApstxkw0",
    authDomain: "akai-e693f.firebaseapp.com",
    projectId: "akai-e693f",
    storageBucket: "akai-e693f.firebasestorage.app",
    messagingSenderId: "1056659479431",
    appId: "1:1056659479431:web:d166da50e1aef3888f5122"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const $ = (id) => document.getElementById(id);
  const loginCard = $('loginCard');
  const adminPanel = $('adminPanel');
  const userInfo = $('userInfo');
  const errorBanner = $('errorBanner');
  const questionList = $('questionList');

  function showError(msg) {
    errorBanner.textContent = '⚠️ ' + msg;
    errorBanner.style.display = 'block';
    // 滾到頁頂讓使用者一定看到
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function clearError() { errorBanner.style.display = 'none'; errorBanner.textContent = ''; }

  // ── 登入流程 ─────────────────────────────────────────────
  $('loginBtn').addEventListener('click', async () => {
    try {
      clearError();
      await signInWithPopup(auth, provider);
    } catch (e) {
      showError('登入失敗：' + (e.message || e.code));
    }
  });

  $('logoutBtn').addEventListener('click', async () => {
    try { await signOut(auth); } catch (e) { showError('登出失敗：' + e.message); }
  });

  let unsubQuestions = null;

  onAuthStateChanged(auth, async (user) => {
    if (unsubQuestions) { unsubQuestions(); unsubQuestions = null; }
    // 沒有 user 或 是匿名身份 → 顯示登入卡，不報錯（Akai 主站會自動匿名登入訪客做 visitorStats）
    if (!user || user.isAnonymous || !user.email) {
      loginCard.style.display = 'block';
      adminPanel.style.display = 'none';
      userInfo.style.display = 'none';
      clearError();
      return;
    }
    try {
      const idTokenResult = await user.getIdTokenResult();
      const isAdmin = !!idTokenResult.claims.admin;
      if (!isAdmin) {
        // 帳號錯了 — 顯示明確錯誤 + 強制登出避免卡在 limbo 狀態
        showError(
          '❌ 帳號權限不足：' + user.email + ' 沒有 admin 權限。\n' +
          '請改用 ipad@mail2.smes.tyc.edu.tw（學校 Gmail）登入。\n' +
          '（系統會自動登出此帳號讓你重新選擇）'
        );
        // 自動登出，讓使用者下次按「Google 登入」可重新挑帳號
        await signOut(auth);
        loginCard.style.display = 'block';
        adminPanel.style.display = 'none';
        userInfo.style.display = 'none';
        return;
      }
      // 認證通過
      $('userEmail').textContent = user.email;
      userInfo.style.display = 'flex';
      loginCard.style.display = 'none';
      adminPanel.style.display = 'block';
      clearError();
      subscribeQuestions();
    } catch (e) {
      showError('讀取 admin claim 失敗：' + e.message);
    }
  });

  // ── 訂閱 talkQuestions 全部訊息 ─────────────────────────────
  let currentQuestions = [];
  let selectedIdx = -1; // T2: 鍵盤選中索引（-1 = 未選）

  function subscribeQuestions() {
    const q = query(collection(db, 'talkQuestions'), orderBy('createdAt', 'desc'));
    unsubQuestions = onSnapshot(q, (snap) => {
      currentQuestions = [];
      snap.forEach((d) => currentQuestions.push({ id: d.id, ...d.data() }));
      renderList();
    }, (err) => {
      showError('讀取訊息失敗：' + err.message);
    });
  }

  // ── 動物 emoji + 編號 mapping（同 live-questions.html）─────
  const AUDIENCE_EMOJIS = ['🐹','🐰','🦊','🐼','🐨','🐯','🦁','🐸','🐻','🐵','🐧','🦄'];
  const userToNumber = new Map();
  let nextNum = 1;
  function getAudience(hash) {
    if (!userToNumber.has(hash)) userToNumber.set(hash, nextNum++);
    const n = userToNumber.get(hash);
    return { num: n, emoji: AUDIENCE_EMOJIS[(n - 1) % AUDIENCE_EMOJIS.length] };
  }

  function renderList() {
    const total = currentQuestions.length;
    const hidden = currentQuestions.filter((q) => q.hidden).length;
    const pinned = currentQuestions.filter((q) => q.pinned).length;
    $('totalCount').textContent = total;
    $('visibleCount').textContent = total - hidden;
    $('hiddenCount').textContent = hidden;
    $('pinnedCount').textContent = pinned;

    if (total === 0) {
      questionList.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><br/>還沒有任何訊息</div>`;
      return;
    }

    questionList.innerHTML = '';
    currentQuestions.forEach((q) => {
      const audience = getAudience(q.userIdHash || 'anon');
      const date = new Date(q.timestamp || q.createdAt?.toMillis?.() || Date.now());
      const timeStr = String(date.getMonth() + 1).padStart(2, '0') + '/' +
                      String(date.getDate()).padStart(2, '0') + ' ' +
                      String(date.getHours()).padStart(2, '0') + ':' +
                      String(date.getMinutes()).padStart(2, '0') + ':' +
                      String(date.getSeconds()).padStart(2, '0');

      const card = document.createElement('div');
      const isSelected = currentQuestions.indexOf(q) === selectedIdx;
      card.className = 'q-card' + (q.hidden ? ' hidden' : '') + (q.pinned ? ' pinned' : '') + (isSelected ? ' selected' : '');
      card.dataset.idx = String(currentQuestions.indexOf(q));
      card.innerHTML = `
        <div class="q-meta">
          <span class="q-badge">${audience.emoji} #${audience.num}</span>
          <span class="q-time">${timeStr}</span>
        </div>
        <div class="q-text ${q.hidden ? 'text-hidden' : ''}">
          <span class="text-content"></span>
          ${q.pinned ? '<span class="status-pill pin">📌 置頂</span>' : ''}
          ${q.hidden ? '<span class="status-pill hide">🙈 隱藏</span>' : ''}
        </div>
        <div class="q-actions">
          <button class="btn-pin${q.pinned ? ' active' : ''}" data-action="pin" data-id="${q.id}">${q.pinned ? '取消置頂' : '📌 置頂'}</button>
          <button class="btn-hide${q.hidden ? ' active' : ''}" data-action="hide" data-id="${q.id}">${q.hidden ? '取消隱藏' : '🙈 隱藏'}</button>
          <button class="btn-del" data-action="del" data-id="${q.id}">🗑️</button>
        </div>
      `;
      card.querySelector('.text-content').textContent = q.text || '(無內容)';
      questionList.appendChild(card);
    });
  }

  // ── 事件委派處理操作 ─────────────────────────────────────
  questionList.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    const action = btn.dataset.action;
    const q = currentQuestions.find((x) => x.id === id);
    if (!q) return;
    btn.disabled = true;
    try {
      const ref = doc(db, 'talkQuestions', id);
      if (action === 'pin') {
        await updateDoc(ref, { pinned: !q.pinned });
      } else if (action === 'hide') {
        await updateDoc(ref, { hidden: !q.hidden });
      } else if (action === 'del') {
        if (!confirm(`確定刪除這則訊息？\n\n「${(q.text || '').slice(0, 40)}」\n\n刪除後不可復原。`)) {
          btn.disabled = false;
          return;
        }
        await deleteDoc(ref);
      }
    } catch (err) {
      showError('操作失敗：' + err.message);
    } finally {
      btn.disabled = false;
    }
  });

  // ── 清空全部 ─────────────────────────────────────────────
  $('clearAllBtn').addEventListener('click', async () => {
    const total = currentQuestions.length;
    if (total === 0) { alert('沒有訊息可清空'); return; }
    if (!confirm(`⚠️ 確定要刪除全部 ${total} 則訊息？\n\n這個操作無法復原，建議只在演講前清測試訊息時用。`)) return;
    if (!confirm(`再次確認：真的要刪除 ${total} 則訊息嗎？`)) return;
    try {
      const snap = await getDocs(collection(db, 'talkQuestions'));
      // 分批 batch 寫入避免單 batch 超過 500 限制
      const docs = [];
      snap.forEach((d) => docs.push(d.ref));
      while (docs.length > 0) {
        const batch = writeBatch(db);
        const chunk = docs.splice(0, 400);
        chunk.forEach((ref) => batch.delete(ref));
        await batch.commit();
      }
      clearError();
    } catch (err) {
      showError('清空失敗：' + err.message);
    }
  });

  $('refreshBtn').addEventListener('click', () => {
    if (unsubQuestions) {
      unsubQuestions();
      unsubQuestions = null;
    }
    subscribeQuestions();
  });

  // ── U1: 匯出 Markdown ────────────────────────────────────
  function exportMarkdown() {
    if (currentQuestions.length === 0) {
      alert('沒有訊息可匯出');
      return;
    }
    const now = new Date();
    const exportTime = now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0') + ' ' +
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0');

    const fmtTime = (q) => {
      const d = new Date(q.timestamp || q.createdAt?.toMillis?.() || Date.now());
      return String(d.getMonth() + 1).padStart(2, '0') + '/' +
             String(d.getDate()).padStart(2, '0') + ' ' +
             String(d.getHours()).padStart(2, '0') + ':' +
             String(d.getMinutes()).padStart(2, '0') + ':' +
             String(d.getSeconds()).padStart(2, '0');
    };

    const pinned = currentQuestions.filter((q) => q.pinned && !q.hidden);
    const normal = currentQuestions.filter((q) => !q.pinned && !q.hidden);
    const hidden = currentQuestions.filter((q) => q.hidden);

    const lines = [];
    lines.push('# 2026 AIFED 演講提問記錄');
    lines.push('');
    lines.push(`> 匯出時間：${exportTime}  `);
    lines.push(`> 總訊息：${currentQuestions.length} 則 · 置頂 ${pinned.length} · 顯示 ${normal.length} · 隱藏 ${hidden.length}`);
    lines.push('');
    lines.push('---');
    lines.push('');

    const renderGroup = (label, items) => {
      if (items.length === 0) return;
      lines.push(`## ${label}（${items.length} 則）`);
      lines.push('');
      items.forEach((q, i) => {
        const a = getAudience(q.userIdHash || 'anon');
        lines.push(`### ${a.emoji} 觀眾 #${a.num} · ${fmtTime(q)}`);
        lines.push('');
        lines.push(`> ${(q.text || '(無內容)').replace(/\n/g, '\n> ')}`);
        const tags = [];
        if (q.pinned) tags.push('📌 置頂');
        if (q.hidden) tags.push('🙈 隱藏');
        if (tags.length) lines.push('');
        if (tags.length) lines.push(`_${tags.join(' · ')}_`);
        lines.push('');
      });
      lines.push('---');
      lines.push('');
    };

    renderGroup('📌 置頂訊息', pinned);
    renderGroup('💬 一般訊息', normal);
    renderGroup('🙈 隱藏訊息', hidden);

    lines.push('');
    lines.push('---');
    lines.push('');
    lines.push('_由 2026 AIFED 演講後台一鍵匯出_');
    lines.push(`_平台：[cagoooo.github.io/Akai/akai-talk-2026](https://cagoooo.github.io/Akai/akai-talk-2026/)_`);

    const md = lines.join('\n');
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const filename = `aifed-2026-questions-${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}.md`;
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  $('exportBtn').addEventListener('click', exportMarkdown);

  // ── T2: 鍵盤快捷鍵 ──────────────────────────────────────
  const kbdOverlay = $('kbdOverlay');
  function toggleKbdOverlay(show) {
    if (show === undefined) show = !kbdOverlay.classList.contains('visible');
    kbdOverlay.classList.toggle('visible', show);
  }
  $('kbdBtn').addEventListener('click', () => toggleKbdOverlay(true));
  $('kbdCloseBtn').addEventListener('click', () => toggleKbdOverlay(false));
  kbdOverlay.addEventListener('click', (e) => {
    if (e.target === kbdOverlay) toggleKbdOverlay(false);
  });

  function moveSelection(delta) {
    if (currentQuestions.length === 0) return;
    if (selectedIdx < 0) {
      selectedIdx = delta > 0 ? 0 : currentQuestions.length - 1;
    } else {
      selectedIdx = (selectedIdx + delta + currentQuestions.length) % currentQuestions.length;
    }
    renderList();
    // scroll selected card into view
    const target = document.querySelector(`[data-idx="${selectedIdx}"]`);
    if (target) target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  async function performSelectedAction(action) {
    if (selectedIdx < 0 || selectedIdx >= currentQuestions.length) return;
    const q = currentQuestions[selectedIdx];
    const ref = doc(db, 'talkQuestions', q.id);
    try {
      if (action === 'pin') {
        await updateDoc(ref, { pinned: !q.pinned });
      } else if (action === 'hide') {
        await updateDoc(ref, { hidden: !q.hidden });
      } else if (action === 'del') {
        if (!confirm(`確定刪除這則訊息？\n\n「${(q.text || '').slice(0, 40)}」\n\n刪除後不可復原。`)) return;
        await deleteDoc(ref);
        selectedIdx = Math.min(selectedIdx, currentQuestions.length - 2);
      }
    } catch (e) {
      showError('操作失敗：' + e.message);
    }
  }

  window.addEventListener('keydown', (e) => {
    // 在 input / textarea / contenteditable 內不處理（避免誤觸）
    const t = e.target;
    if (t && (t.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;

    // overlay 開時只接 ? 或 Esc
    if (kbdOverlay.classList.contains('visible')) {
      if (e.key === '?' || e.key === 'Escape') {
        toggleKbdOverlay(false);
        e.preventDefault();
      }
      return;
    }

    // 未登入時不處理（loginCard 顯示時）
    if (loginCard.style.display !== 'none') return;

    const k = e.key;
    if (k === 'ArrowDown' || k === 'j') { moveSelection(1); e.preventDefault(); }
    else if (k === 'ArrowUp' || k === 'k') { moveSelection(-1); e.preventDefault(); }
    else if (k === 'p' || k === 'P') { performSelectedAction('pin'); e.preventDefault(); }
    else if (k === 'h' || k === 'H') { performSelectedAction('hide'); e.preventDefault(); }
    else if (k === 'd' || k === 'D' || k === 'Delete') { performSelectedAction('del'); e.preventDefault(); }
    else if (k === 'e' || k === 'E') { exportMarkdown(); e.preventDefault(); }
    else if (k === '?') { toggleKbdOverlay(true); e.preventDefault(); }
    else if (k === 'Escape') {
      if (selectedIdx >= 0) { selectedIdx = -1; renderList(); e.preventDefault(); }
    }
  });
</script>
</body>
</html>
