<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100 工具達成 🎉 — 阿凱老師科技教育創新專區</title>
  <meta name="description" content="一位桃園市石門國小老師，兩年內獨立完成 100 款免費教育工具。5 分 32 秒宣傳影片，含同步字幕與旁白。" />
  <meta property="og:title" content="100 工具達成 🎉 阿凱老師科技教育創新專區" />
  <meta property="og:description" content="一位國小老師，一個人，做出了整整一百款教育工具。" />
  <meta property="og:image" content="../celebration100/cover.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111827;
      --card: #1f2937;
      --border: #374151;
      --orange: #ff8c42;
      --gold: #fbbf24;
      --text: #f9fafb;
      --muted: #9ca3af;
      --font: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 1100px;
      padding: 32px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .03em;
      transition: color .15s;
    }
    .back-link:hover { color: var(--orange); }
    .badge {
      background: linear-gradient(135deg, var(--orange), var(--gold));
      color: #111;
      font-size: 12px;
      font-weight: 900;
      padding: 4px 12px;
      border-radius: 999px;
      letter-spacing: .05em;
    }

    /* ── Title ── */
    .title-block {
      width: 100%;
      max-width: 1100px;
      padding: 28px 24px 16px;
      text-align: center;
    }
    .title-main {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: .02em;
    }
    .title-main .num {
      background: linear-gradient(90deg, var(--orange), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .title-sub {
      margin-top: 10px;
      font-size: 16px;
      color: var(--muted);
      letter-spacing: .04em;
    }

    /* ── Video wrapper ── */
    .video-wrap {
      width: 100%;
      max-width: 1100px;
      padding: 0 16px;
    }
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--border),
        0 32px 80px rgba(0,0,0,.6),
        0 0 80px rgba(255,140,66,.08);
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── Stats strip ── */
    .stats {
      width: 100%;
      max-width: 1100px;
      padding: 20px 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-chip .val { color: var(--text); }

    /* ── CTA buttons ── */
    .cta-row {
      width: 100%;
      max-width: 1100px;
      padding: 8px 24px 48px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--orange);
      color: #fff;
      font-weight: 900;
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      letter-spacing: .03em;
      transition: opacity .15s, transform .1s;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      text-decoration: none;
      letter-spacing: .03em;
      transition: color .15s, border-color .15s;
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

    /* ── Footer ── */
    .footer {
      width: 100%;
      padding: 20px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .footer a { color: var(--orange); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a class="back-link" href="../">
      <span>←</span>
      <span>回到阿凱老師科技教育創新專區</span>
    </a>
    <span class="badge">v3.6.59 · 2026-05-25</span>
  </header>

  <div class="title-block">
    <h1 class="title-main">
      <span class="num">100</span> 個工具達成 🎉
    </h1>
    <p class="title-sub">一位國小老師，一個人，兩年做出一百款免費教育工具</p>
  </div>

  <div class="video-wrap">
    <div class="video-container">
      <video
        controls
        preload="metadata"
        poster="../celebration100/cover.png"
        aria-label="阿凱老師科技教育創新專區 100 工具達成宣傳影片"
      >
        <source src="./akai-promo-v3.mp4" type="video/mp4" />
        <p>您的瀏覽器不支援 HTML5 影片。<a href="./akai-promo-v3.mp4">點此下載</a></p>
      </video>
    </div>
  </div>

  <div class="stats">
    <div class="stat-chip">🎬 <span class="val">5:32</span> 宣傳影片</div>
    <div class="stat-chip">🛠️ <span class="val">100</span> 款工具</div>
    <div class="stat-chip">📝 <span class="val">104</span> 篇手寫長文</div>
    <div class="stat-chip">🏫 <span class="val">桃園市石門國小</span></div>
    <div class="stat-chip">📜 <span class="val">MIT 開源</span> 永久免費</div>
  </div>

  <div class="cta-row">
    <a class="btn-primary" href="../" >
      🛫 立刻探索全部工具
    </a>
    <a class="btn-secondary" href="https://github.com/cagoooo/Akai" target="_blank" rel="noopener noreferrer">
      ⭐ GitHub 開源碼
    </a>
    <a class="btn-secondary" href="./akai-promo-v3.mp4" download>
      ⬇ 下載影片
    </a>
  </div>

  <footer class="footer">
    Made with ❤ by <a href="../">阿凱老師</a> ·

    · MIT License · 影片音樂 CC BY
  </footer>

</body>
</html>
