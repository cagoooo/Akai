<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>現場提問實況 · 2026 AIFED</title>
<link rel="icon" href="favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Noto+Serif+TC:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1F4C3E;
    --navy-deep: #143526;
    --cream: #F4F0E6;
    --orange: #C99744;
    --red: #B9512B;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color: var(--cream);
    font-family: 'Noto Sans TC', system-ui, sans-serif;
    width: 100%; height: 100vh; overflow: hidden;
  }
  .wrap {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    padding: 24px 36px;
    gap: 16px;
  }
  header {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .brand {
    font-size: 18px; font-weight: 900; letter-spacing: 0.04em;
  }
  .brand .accent { color: var(--orange); }
  .stats {
    display: flex; gap: 16px; align-items: center;
    font-size: 12px;
    color: rgba(244,240,230,.6);
    font-family: 'JetBrains Mono', monospace;
  }
  .stats .count { color: var(--orange); font-weight: 700; font-size: 14px; }
  .live-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px;
    background: var(--red); border-radius: 999px;
    font-size: 12px; font-weight: 800; letter-spacing: 0.08em;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #fff;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .6; transform: scale(1.2); }
  }

  main {
    position: relative;
    overflow: hidden;
  }
  /* 大字輪播主卡 */
  .card-active {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column; justify-content: center;
    padding: 20px 36px;
    border-radius: 20px;
    background: rgba(244,240,230,.06);
    border: 2px solid rgba(244,240,230,.15);
    animation: slideIn .5s ease-out;
  }
  .card-text {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 700;
    line-height: 1.5;
    color: var(--cream);
    margin-bottom: 24px;
    word-break: break-word;
  }
  .card-text::before {
    content: '「';
    color: var(--orange);
    margin-right: 6px;
  }
  .card-text::after {
    content: '」';
    color: var(--orange);
    margin-left: 6px;
  }
  .card-meta {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px;
    color: rgba(244,240,230,.55);
    font-family: 'JetBrains Mono', monospace;
  }
  .card-meta .from { color: var(--orange); font-weight: 700; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 等待 / 空狀態 */
  .empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
    color: rgba(244,240,230,.5);
    text-align: center;
  }
  .empty-emoji { font-size: 64px; opacity: .6; }
  .empty-text { font-size: 18px; font-weight: 500; }
  .empty-hint { font-size: 13px; opacity: .8; }

  /* 縮圖列（過去問題）*/
  .recent-strip {
    display: flex; gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .recent-strip::-webkit-scrollbar { height: 4px; }
  .recent-strip::-webkit-scrollbar-thumb { background: rgba(244,240,230,.2); border-radius: 2px; }
  .chip {
    flex: 0 0 auto;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(244,240,230,.08);
    border: 1px solid rgba(244,240,230,.15);
    font-size: 11px;
    color: rgba(244,240,230,.7);
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: background .15s ease;
  }
  .chip:hover { background: rgba(201,151,68,.2); }
  .chip.active {
    background: rgba(201,151,68,.25);
    border-color: var(--orange);
    color: var(--cream);
  }

  footer {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: rgba(244,240,230,.4);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }
  .clock { font-weight: 700; color: var(--cream); }

  @media (max-width: 768px) {
    .wrap { padding: 14px 16px; gap: 10px; }
    .card-active { padding: 12px 18px; border-radius: 14px; }
    .card-text { font-size: clamp(20px, 6vw, 32px); margin-bottom: 14px; }
    .empty-emoji { font-size: 44px; }
    .empty-text { font-size: 15px; }
    header .brand { font-size: 14px; }
    .stats { font-size: 10px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">🎤 現場提問實況 <span class="accent">· 2026 AIFED</span></div>
    <div class="qr-block" style="display:flex;align-items:center;gap:12px;background:rgba(244,240,230,.08);border:1.5px solid rgba(244,240,230,.2);border-radius:12px;padding:8px 14px;">
      <img src="assets/qr-line-talk.png" alt="LINE Bot 加好友 QR" style="width:64px;height:64px;border-radius:6px;background:#fff;padding:3px;" />
      <div style="font-size:12px;line-height:1.45;color:rgba(244,240,230,.85);">
        <div style="font-weight:900;color:var(--orange);font-size:13px;">📲 掃 QR 加 LINE 提問</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(244,240,230,.6);">@399ffpsg</div>
      </div>
    </div>
    <div class="stats">
      <span>已收 <span class="count" id="count">0</span> 則</span>
      <span class="live-tag"><span class="live-dot"></span>LIVE</span>
    </div>
  </header>
  <main id="stage">
    <div class="empty" id="empty">
      <div class="empty-emoji">💬</div>
      <div class="empty-text">等待第一則提問...</div>
      <div class="empty-hint">掃描 closing slide QR 加 LINE → 傳訊息提問</div>
    </div>
  </main>
  <div class="recent-strip" id="strip"></div>
  <footer>
    <div>每 6 秒輪播 · 顯示最新 8 則</div>
    <div class="clock" id="clock">--:--</div>
  </footer>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
  import { getFirestore, collection, query, orderBy, limit, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDWwk3dCFmEM9_5x07fvmBMZ6LApstxkw0",
    authDomain: "akai-e693f.firebaseapp.com",
    projectId: "akai-e693f",
    storageBucket: "akai-e693f.firebasestorage.app",
    messagingSenderId: "1056659479431",
    appId: "1:1056659479431:web:d166da50e1aef3888f5122"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const $ = (id) => document.getElementById(id);
  const stage = $('stage');
  const empty = $('empty');
  const strip = $('strip');

  // 時鐘
  function tickClock() {
    const now = new Date();
    $('clock').textContent =
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0') + ':' +
      String(now.getSeconds()).padStart(2, '0');
  }
  setInterval(tickClock, 1000);
  tickClock();

  // 訂閱最新 8 則
  let questions = [];
  let activeIdx = 0;
  let rotateTimer = null;

  function renderActive() {
    if (questions.length === 0) {
      empty.style.display = 'flex';
      const old = stage.querySelector('.card-active');
      if (old) old.remove();
      return;
    }
    empty.style.display = 'none';
    const q = questions[activeIdx];
    if (!q) return;
    const date = new Date(q.timestamp || Date.now());
    const timeStr = String(date.getHours()).padStart(2, '0') + ':' +
                    String(date.getMinutes()).padStart(2, '0') + ':' +
                    String(date.getSeconds()).padStart(2, '0');

    // 重建卡片觸發 slideIn 動畫
    const old = stage.querySelector('.card-active');
    if (old) old.remove();
    const card = document.createElement('div');
    card.className = 'card-active';
    card.innerHTML = `
      <div class="card-text"></div>
      <div class="card-meta">
        <span class="from">— 觀眾 ${q.userIdHash || 'anon'}</span>
        <span>${timeStr} · 第 ${activeIdx + 1} 則 / ${questions.length}</span>
      </div>
    `;
    card.querySelector('.card-text').textContent = q.text;
    stage.appendChild(card);
    // 同步 strip active state
    Array.from(strip.children).forEach((el, i) => {
      el.classList.toggle('active', i === activeIdx);
    });
  }

  function renderStrip() {
    strip.innerHTML = '';
    questions.forEach((q, i) => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (i === activeIdx ? ' active' : '');
      chip.textContent = q.text;
      chip.title = q.text;
      chip.addEventListener('click', () => {
        activeIdx = i;
        renderActive();
        resetRotate();
      });
      strip.appendChild(chip);
    });
  }

  function resetRotate() {
    if (rotateTimer) clearInterval(rotateTimer);
    rotateTimer = setInterval(() => {
      if (questions.length <= 1) return;
      activeIdx = (activeIdx + 1) % questions.length;
      renderActive();
    }, 6000);
  }

  const q = query(
    collection(db, 'talkQuestions'),
    orderBy('createdAt', 'desc'),
    limit(8),
  );
  onSnapshot(q, (snap) => {
    const next = [];
    snap.forEach((doc) => {
      const data = doc.data();
      next.push({
        id: doc.id,
        text: data.text || '',
        userIdHash: data.userIdHash || 'anon',
        timestamp: data.timestamp || (data.createdAt?.toMillis?.() ?? Date.now()),
      });
    });
    questions = next; // 已是 desc 順序，第一個最新
    $('count').textContent = next.length;
    // 新訊息進來自動切到最新一則
    activeIdx = 0;
    renderStrip();
    renderActive();
    resetRotate();
  }, (err) => {
    console.warn('[live-questions] onSnapshot 失敗', err);
  });
</script>
</body>
</html>
