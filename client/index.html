  <!-- 動態設定 base URL -->
  <script>
    (function () {
      // 開發環境強制移除 Service Worker (避免 503 Service Unavailable)
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            for (let registration of registrations) {
              console.warn('[Dev] 強制移除 Service Worker:', registration.scope);
              registration.unregister();
            }
          });
        }
      }

      var base = window.location.pathname.startsWith('/Akai') ? '/Akai/' : '/';
      // 動態插入 link 標籤
      var head = document.head;
      var createLink = function (rel, href, type, sizes) {
        var link = document.createElement('link');
        link.rel = rel;
        link.href = base + href;
        if (type) link.type = type;
        if (sizes) link.sizes = sizes;
        head.appendChild(link);
      };
      createLink('icon', 'favicon.ico', 'image/x-icon');
      createLink('icon', 'favicon-32x32.png', 'image/png', '32x32');
      createLink('icon', 'favicon-16x16.png', 'image/png', '16x16');
      createLink('apple-touch-icon', 'apple-touch-icon.png', null, '180x180');
      createLink('manifest', 'manifest.json');
    })();
  </script>

  <!-- GitHub Pages SPA 路由處理 -->

        window.history.replaceState(null, '', redirect);
      }
    })();

  <!-- LINE 瀏覽器 Fallback 載入畫面 -->
  <div id="line-fallback"
    style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">

      <p style="color: #666; font-size: 14px; line-height: 1.6; margin: 0 0 25px 0;">
        若長時間無法載入，建議點擊下方按鈕用外部瀏覽器開啟
      </p>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <a id="fallback-external-link" href="#" target="_blank" rel="noopener noreferrer"
          style="display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 14px 28px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 15px; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);">
          🔗 用外部瀏覽器開啟
        </a>
        <button onclick="document.getElementById('line-fallback').style.display='none';"
          style="background: transparent; border: 2px solid #ddd; color: #666; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 500;">
          繼續等待
        </button>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      // LINE 瀏覽器檢測 - 延遲至 DOMContentLoaded 以免阻塞初次算繪
      (function () {
        // LINE 瀏覽器檢測
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isLine = /Line/i.test(ua);
        var isInAppBrowser = /FBAN|FBAV|Instagram|Twitter|MicroMessenger|Line/i.test(ua);

        if (isLine || isInAppBrowser) {
          // 設定超時顯示 fallback
          var fallbackTimeout = setTimeout(function () {
            var fallback = document.getElementById('line-fallback');
            var root = document.getElementById('root');

            // 如果 root 仍然是空的或只有載入動畫，顯示 fallback
            if (root && (!root.hasChildNodes() || root.innerHTML.trim() === '')) {
              fallback.style.display = 'flex';

              // 設定外部連結
              var externalLink = document.getElementById('fallback-external-link');
              var currentUrl = window.location.href;

              // 嘗試解析工具 ID 並獲取對應的外部連結
              var toolMatch = currentUrl.match(/\/tool\/(\d+)/);
              if (toolMatch) {
                // 工具對應的外部連結映射 (常用工具)
                var toolUrls = {
                  47: 'https://cagoooo.github.io/signature/',
                  48: 'https://cagoooo.github.io/form/',
                  46: 'https://cagoooo.github.io/schedule/',
                  45: 'https://cagoooo.github.io/cloud',
                  41: 'https://cagoooo.github.io/song/',
                  3: 'https://cagoooo.github.io/vote/',
                  2: 'https://cagoooo.github.io/staff/',
                  10: 'https://cagoooo.github.io/class/'
                };
                var toolId = parseInt(toolMatch[1]);
                if (toolUrls[toolId]) {
                  externalLink.href = toolUrls[toolId];
                } else {
                  externalLink.href = currentUrl;
                }
              } else {
                externalLink.href = currentUrl;
              }
            }
          }, 5000); // 5 秒後顯示 fallback

          // 當 React 成功渲染後，取消 fallback
          var checkInterval = setInterval(function () {
            var root = document.getElementById('root');
            if (root && root.children.length > 0 && root.querySelector('[class*="min-h-screen"]')) {
              clearTimeout(fallbackTimeout);
              clearInterval(checkInterval);
              document.getElementById('line-fallback').style.display = 'none';
            }
          }, 500);

          // 30 秒後停止檢查
          setTimeout(function () {
            clearInterval(checkInterval);
          }, 30000);
        }
      })();
    });
  </script>

  <div id="root"></div>
