name: Lighthouse CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Wait for deployment
        # 等待 GitHub Pages 部署完成
        run: sleep 30

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        id: lighthouse
        continue-on-error: true
        with:
          urls: |
            https://cagoooo.github.io/Akai/
          budgetPath: ./budget.json
          uploadArtifacts: false
          temporaryPublicStorage: true

      - name: Format Lighthouse Score & enforce thresholds
        id: format_lighthouse_score
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // 分數閘門：低於門檻 → workflow 失敗（防退步）。
            // 暫時放寬：把對應 key 改成 0 即可禁用該門檻。
            const THRESHOLDS = {
              performance: 0.80,
              accessibility: 0.90,
              'best-practices': 0.85,
              seo: 0.90,
            };

            try {
              const results = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));
              const summary = results[0]?.summary || {};

              const formatScore = (score) => {
                if (score == null) return '❓ 無資料';
                const value = Math.round(score * 100);
                if (value >= 90) return `🟢 ${value}`;
                if (value >= 50) return `🟡 ${value}`;
                return `🔴 ${value}`;
              };

              const rows = Object.keys(THRESHOLDS).map((key) => {
                const score = summary[key];
                const min = THRESHOLDS[key];
                const pass = score == null || min === 0 ? '—' : score >= min ? '✅' : '❌';
                const minDisp = min === 0 ? '不檢查' : Math.round(min * 100);
                return `| ${key} | ${formatScore(score)} | ≥ ${minDisp} | ${pass} |`;
              });

              const output = [
                '## Lighthouse 效能報告',
                '',
                '| 指標 | 分數 | 門檻 | 狀態 |',
                '|------|------|------|------|',
                ...rows,
                '',
                '_門檻定義在 `.github/workflows/lighthouse.yml` THRESHOLDS。低於門檻 → workflow 失敗（防退步）。_',
              ].join('\n');
              console.log(output);
              await core.summary.addRaw(output).write();

              // 找出未達標
              const failed = Object.keys(THRESHOLDS).filter((key) => {
                const score = summary[key];
                const min = THRESHOLDS[key];
                if (min === 0) return false;
                if (score == null) return false;
                return score < min;
              });

              if (failed.length > 0) {
                const msgs = failed.map((k) => `${k}: ${Math.round(summary[k] * 100)} < ${Math.round(THRESHOLDS[k] * 100)}`).join('; ');
                core.setFailed(`Lighthouse 分數退步：${msgs}`);
              }
            } catch (e) {
              core.warning(`無法讀取 Lighthouse 結果：${e.message}`);
            }

      - name: Upload Lighthouse Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report-${{ github.run_number }}
          path: .lighthouseci/
          retention-days: 30
          if-no-files-found: ignore
