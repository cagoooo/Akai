name: Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java for Firebase Emulator
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies reproducibly
        run: npm ci --ignore-scripts

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --run

      - name: Functions policy tests
        run: npm run test:functions

      - name: Firestore Rules tests
        run: npm run test:rules
