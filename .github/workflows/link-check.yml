name: "\U0001F517 Weekly Link Health Check"

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run link checker
        id: linkcheck
        run: node scripts/check-links.mjs
        continue-on-error: true

      - name: Create GitHub Issue on failure
        if: steps.linkcheck.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(node scripts/check-links.mjs 2>&1 || true)
          gh issue create \
            --title "🔗 Dead Link Report $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --label "maintenance"
