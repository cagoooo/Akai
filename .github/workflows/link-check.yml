name: "🔗 Weekly Link Health Check"

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run link checker (capture output + exit code)
        id: linkcheck
        run: |
          set +e
          node scripts/check-links.mjs > link-report.md 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          # 印出完整報告到 Actions log 方便除錯
          cat link-report.md
          # 不讓步驟本身 fail，我們會依 exit_code 判斷後續動作
          exit 0

      - name: Ensure "maintenance" label exists
        if: steps.linkcheck.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "maintenance" \
            --description "平台維護相關議題" \
            --color "d4c5f9" \
            2>/dev/null || echo "Label already exists, skipping."

      - name: Create GitHub Issue on failure
        if: steps.linkcheck.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🔗 死連結報告 $(date +%Y-%m-%d)" \
            --body-file link-report.md \
            --label "maintenance"

      - name: Report success
        if: steps.linkcheck.outputs.exit_code == '0'
        run: echo "✅ 所有連結均正常運作！"

      - name: Fail job if links broken (for status visibility)
        if: steps.linkcheck.outputs.exit_code != '0'
        run: |
          echo "❌ 偵測到死連結，Issue 已建立。"
          exit 1
